version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - dupl
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - misspell
    - mnd
    - perfsprint
    - staticcheck
    - unparam
    - usestdlibvars
  settings:
    gocyclo:
      min-complexity: 20
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "10"
        - "100"
      ignored-functions:
        - "time.*"
        - "http.StatusText"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - goconst
          - gocyclo
          - gosec
          - mnd
          - perfsprint
      - path: cmd/fixtures/data\.go
        linters:
          - mnd
          - misspell

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
      module-path: pkgstatsd
