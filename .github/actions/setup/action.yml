name: 'Common Setup'
description: 'Performs common setup steps for Go/Node.js projects, including installing Just, Go, GolangCI-Lint, pnpm, and project dependencies.'

runs:
  using: "composite"
  steps:
    - name: Install Just
      uses: extractions/setup-just@v3
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
          version: 10
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
          go-version-file: "go.mod"
    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      shell: bash
    - name: Install dependencies
      run: just install
      shell: bash
