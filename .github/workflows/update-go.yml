name: Update Go

on:
    schedule:
        - cron: "0 2 * * 1"
    workflow_dispatch:

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
              with:
                  token: ${{ secrets.MAINTENANCE_TOKEN }}
            - name: Run Common Setup
              uses: ./.github/actions/setup
              with:
                  go-version: stable
            - name: Install golangci-lint
              run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
            - name: Update Go dependencies
              run: just update-go
            - name: Build Templates
              run: just build-templates
            - name: Format code
              run: just fmt
            - name: Run Linter
              run: just lint
            - name: Run Tests
              run: just test
            - name: Commit updates
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 #v7.1.0
              with:
                  commit_message: Update Go dependencies
                  commit_user_name: Maintenance Bob
                  commit_user_email: bob@archlinux.de
                  commit_author: Maintenance Bob <bob@archlinux.de>
